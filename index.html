        function Button({ children, onClick, className = "", type = "button" }) {
            return (
                <motion.button
                    type={type}
                    onClick={onClick}
                    whileTap={{ scale: 0.97 }}
                    whileHover={{ scale: 1.03 }}
                    className={`px-6 py-3 rounded-xl bg-gradient-to-r from-primary to-accent shadow-glow font-bold text-white transition-all flex items-center justify-center gap-2 ${className}`}
                >
                    {children}
                </motion.button>
            );
        }

        function Card({ children, className = "" }) {
            return (
                <motion.div
                    whileHover={{ y: -8, scale: 1.01 }}
                    transition={{ duration: 0.3 }}
                    className={`bg-surface backdrop-blur-xl border border-white/5 rounded-2xl p-6 shadow-lg hover:shadow-glowCyan transition-all overflow-hidden relative ${className}`}
                >
                    {children}
                </motion.div>
            );
        }

        function PageWrapper({ children, route }) {
            return (
                <motion.div
                    key={route}
                    initial={{ opacity: 0, y: 15 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, y: -15 }}
                    transition={{ duration: 0.3 }}
                >
                    {children}
                </motion.div>
            );
        }

        function ImageSlider({ images }) {
            const [index, setIndex] = React.useState(0);

            if (!images || images.length === 0) return null;

            const handleNext = (e) => { e.stopPropagation(); setIndex((prev) => (prev + 1) % images.length); };
            const handlePrev = (e) => { e.stopPropagation(); setIndex((prev) => (prev - 1 + images.length) % images.length); };

            return (
                <div className="relative w-full h-48 group overflow-hidden bg-gradient-to-br from-white/5 to-white/10 flex items-center justify-center p-6 backdrop-blur-sm border-b border-white/5">
                    <img 
                        src={images[index]} 
                        className="w-full h-full object-contain transition-transform duration-500 ease-out group-hover:scale-110 drop-shadow-2xl" 
                        alt="Product" 
                    />
                    
                    {images.length > 1 && (
                        <>
                            <button onClick={handlePrev} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white w-8 h-8 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10"><i className="fa-solid fa-chevron-left text-xs"></i></button>
                            <button onClick={handleNext} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white w-8 h-8 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10"><i className="fa-solid fa-chevron-right text-xs"></i></button>
                            <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1 z-10">
                                {images.map((_, i) => (
                                    <span key={i} onClick={(e) => { e.stopPropagation(); setIndex(i); }} className={`w-1.5 h-1.5 rounded-full cursor-pointer transition-all ${i === index ? "bg-accent scale-125" : "bg-white/40 hover:bg-white/60"}`} />

                            </div>
                        </>
                    )}
                </div>
            );
        }

                                <div className="flex gap-6 mt-4 md:mt-0">

                                    <a href="#" className="hover:text-accent transition-colors"><i className="fa-brands fa-instagram fa-xl"></i></a>

                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // ==========================================

                    <div className="grid md:grid-cols-3 gap-6">

        function HowToBuy() {

        function RecentDeliveries() {
            const deliveries = [

                { title: "شاحن Baseus سريع", status: "في طريقها للزبون", client: "رفيدة (خنشلة)", time: "متوقع في غضون 5 أيام", icon: "fa-plug", color: "text-yellow-400" }

            return (

                                    </div>

                                </div>
                                <h3 className="font-bold text-lg">{item.title}</h3>
                                <p className="text-white/60 text-sm"><i className="fa-solid fa-user mr-1"></i> العميل: {item.client}</p>
                                <p className="text-white/60 text-sm"><i className="fa-solid fa-truck mr-1"></i> {item.time}</p>
                            </Card>

        // ==========================================
        // PAGES
        // ==========================================

        
        function CustomerReviews() {
            const [reviews, setReviews] = useState([]);
            const [loading, setLoading] = useState(true);
            const [form, setForm] = useState({ user_name: '', content: '' });
            const [submitState, setSubmitState] = useState('idle'); // idle, loading, success

            const fetchReviews = async () => {
                const { data } = await supabase.from('comments').select('*').eq('status', 'Approved').order('created_at', { ascending: false }).limit(6);
                if (data) setReviews(data);
                setLoading(false);
            };

            useEffect(() => { fetchReviews(); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitState('loading');
                const { error } = await supabase.from('comments').insert([form]);
                if (error) {
                    alert("حدث خطأ أثناء إرسال التقييم");
                    setSubmitState('idle');
                } else {
                    setSubmitState('success');
                    setForm({ user_name: '', content: '' });
                    setTimeout(() => setSubmitState('idle'), 5000);
                }
            };

            return (
                <div className="my-20 max-w-6xl mx-auto">
                    <h2 className="text-3xl font-bold text-center mb-4">آراء <span className="text-gradient">العملاء</span> 💬</h2>
                    <p className="text-center text-white/70 mb-10">تجارب حقيقية من عملائنا الكرام بعد استخدام خدمات المتجر</p>
                    
                    <div className="grid md:grid-cols-3 gap-6 mb-12">
                        {loading ? (
                            Array(3).fill(0).map((_, i) => <Card key={i} className="h-32 bg-white/5 animate-pulse" />)
                        ) : reviews.length === 0 ? (
                            <div className="col-span-3 text-center text-white/50 py-8 border border-white/5 border-dashed rounded-xl">لا توجد تقييمات حتى الآن. كن أول من يقيّم خدماتنا!</div>
                        ) : (
                            reviews.map(r => (
                                <Card key={r.id} className="relative">
                                    <div className="flex items-center gap-3 mb-3">
                                        <div className="w-10 h-10 rounded-full bg-gradient-to-r from-primary to-accent flex items-center justify-center font-bold text-white shadow-glowCyan">
                                            {r.user_name.charAt(0)}
                                        </div>
                                        <div>
                                            <h4 className="font-bold">{r.user_name}</h4>
                                            <div className="flex text-yellow-400 text-xs"><i className="fa-solid fa-star"></i><i className="fa-solid fa-star"></i><i className="fa-solid fa-star"></i><i className="fa-solid fa-star"></i><i className="fa-solid fa-star"></i></div>
                                        </div>
                                    </div>
                                    <p className="text-white/80 text-sm leading-relaxed">{r.content}</p>
                                </Card>
                            ))
                        )}
                    </div>

                    <Card className="max-w-2xl mx-auto p-8 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-full h-1 bg-gradient-to-r from-accent to-primary"></div>
                        <h3 className="text-xl font-bold mb-6 text-center">أضف تقييمك الخاص</h3>
                        
                        {submitState === 'success' ? (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="text-center py-6">
                                <i className="fa-solid fa-circle-check text-5xl text-green-400 mb-4 shadow-glowCyan rounded-full"></i>
                                <h4 className="font-bold text-lg text-green-400 mb-2">شكراً لتقييمك!</h4>
                                <p className="text-white/60 text-sm">تم إرسال تقييمك بنجاح، سيظهر هنا بعد مراجعته من الإدارة.</p>
                            </motion.div>
                        ) : (
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>

        function PayPalButton({ amount, orderDetails = {} }) {
            const paypalRef = React.useRef();

            React.useEffect(() => {
                paypalRef.current.innerHTML = "";
                if (window.paypal) {
                    window.paypal.Buttons({
                        createOrder: async (data, actions) => {
                            try {
                                const res = await fetch("https://netlify-6ukv.onrender.com/api/paypal/create-order", {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({ amount: parseFloat(amount) })
                                });
                                const orderData = await res.json();
                                if (orderData.id) return orderData.id;
                                throw new Error(orderData.error || "Failed to create order");
                            } catch (err) {
                                console.error(err);
                                alert("حدث خطأ أثناء إعداد عملية الدفع");
                            }
                        },
                        onApprove: async (data, actions) => {
                            try {
                                const res = await fetch("https://netlify-6ukv.onrender.com/api/paypal/capture-order", {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({
                                        order_id: data.orderID,
                                        product_details: { ...orderDetails, amount_dzd: parseInt((parseFloat(amount) * 265).toFixed(0)) }
                                    })
                                });
                                const captureData = await res.json();
                                if (captureData.success) {
                                    alert("تمت عملية الدفع بنجاح! تم حفظ طلبك بأمان.");
                                } else {
                                    alert("تم الدفع لكن حدث خطأ أثناء التحقق من الخادم.");
                                }
                            } catch (err) {
                                console.error(err);
                                alert("فشل في الاتصال بالخادم لتسجيل طلبك، يرجى مراسلة الدعم.");
                            }
                        }
                    }).render(paypalRef.current);
                }
            }, [amount, orderDetails]);

            return <div ref={paypalRef} className="mt-4 w-full"></div>;
        }

                        <div className="mt-20 text-center bg-surface border border-white/5 p-8 rounded-2xl max-w-2xl mx-auto">
                            <h3 className="text-2xl font-bold mb-4">هل تبحث عن اشتراك محدد؟ 🎬💻</h3>
                            <p className="text-white/60 mb-6">نوفر تقريباً جميع الاشتراكات الرقمية! للاستفسار عن أي اشتراك اتصل بنا وسنقوم بتوفيره لك فوراً.</p>
                            <div className="flex justify-center gap-4">
                                <a href="https://t.me/BOOGEYMAN_DZ" target="_blank"><Button className="bg-gradient-to-r from-blue-500 to-cyan-400">تيليجرام</Button></a>
                                <a href="https://wa.me/213562208794" target="_blank"><Button className="bg-gradient-to-r from-green-500 to-emerald-400">واتساب</Button></a>
                            </div>
                        </div>
                    </div>
                </PageWrapper>
            );
        }


        function Topup({ gameName, gameIcon, options }) {
            const [selected, setSelected] = useState(options[0].value);
            return (
                <Card className="p-0">
                    <div className="p-6">
                        <h3 className="text-xl font-bold text-center mb-6">{gameIcon} {gameName}</h3>
                        <input
                            placeholder="أدخل الـ ID"
                            className="w-full p-4 rounded-xl bg-black/40 border border-white/10 text-center focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-all mb-4 text-lg"
                        />
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
                            {options.map((opt) => (
                                <button
                                    key={opt.value}
                                    onClick={() => setSelected(opt.value)}
                                    className={`p-3 rounded-xl transition-all ${
                                        selected === opt.value
                                        ? "bg-primary/30 border border-primary text-white"
                                        : "bg-white/5 border border-white/5 text-white/70 hover:bg-white/10"
                                    }`}
                                >
                                    {opt.label}
                                </button>
                            ))}
                        </div>
                        <Button className="w-full text-lg py-4">اشحن {gameName}</Button>
                    </div>
                </Card>
            );
        }

        function Gaming() {
            return (
                <PageWrapper route="/gaming">
                    <div className="py-10">
                        <h1 className="text-4xl font-bold mb-4 text-center">شحن <span className="text-gradient">الألعاب 🎮</span></h1>
                        <p className="text-center text-white/70 mb-10">احصل على شحن فوري وآمن لحسابك</p>
                        
                        <div className="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto">
                            <Topup 
                                gameName="Free Fire"
                                gameIcon="🔥"
                                options={[
                                    { value: "100", label: "100 💎" },
                                    { value: "210", label: "210 💎" },
                                    { value: "530", label: "530 💎" },
                                    { value: "1080", label: "1080 💎" },
                                    { value: "weekly", label: "عضوية أسبوعية" },
                                    { value: "monthly", label: "عضوية شهرية" }
                                ]}
                            />
                            <Topup 
                                gameName="PUBG Mobile"
                                gameIcon="🔫"
                                options={[
                                    { value: "60", label: "60 UC" },
                                    { value: "325", label: "325 UC" },
                                    { value: "660", label: "660 UC" },
                                    { value: "1800", label: "1800 UC" },
                                    { value: "prime", label: "Prime Plus" }
                                ]}
                            />
                            <Topup 
                                gameName="eFootball 2026"
                                gameIcon="⚽"
                                options={[
                                    { value: "130", label: "130 Coins" },
                                    { value: "300", label: "300 Coins" },
                                    { value: "1050", label: "1050 Coins" },
                                    { value: "2150", label: "2150 Coins" },
                                    { value: "3300", label: "3300 Coins" }
                                ]}
                            />
                        </div>
                        <div className="mt-10 text-center text-white/60 max-w-2xl mx-auto">
                            <p className="mb-2"><strong className="text-accent">الدفع:</strong> بالدينار الجزائري | <strong className="text-accent">التفعيل:</strong> فوري بعد الدفع</p>
                            <p className="text-sm">ملاحظة: تأكد من إدخال ID صحيح، نحن غير مسؤولين عن الأخطاء.</p>
                        </div>
                    </div>
                </PageWrapper>
            );
        }

        function AnimatedRoutes() {
            const location = useLocation();
            return (
                <AnimatePresence mode="wait">
                    <Routes location={location} key={location.pathname}>
                        <Route path="/" element={<Home />} />
                        <Route path="/shopping" element={<Shopping />} />
                        <Route path="/digital" element={<Digital />} />
                        <Route path="/gaming" element={<Gaming />} />
                    </Routes>
                </AnimatePresence>
            );
        }

        function App() {
            return (
                <HashRouter>
                    <Layout>
                        <AnimatedRoutes />
                    </Layout>
                </HashRouter>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
